name: interceptly
description: "Flutter network inspector for Dio, HTTP, and Chopper with overlay UI, replay tools, and HAR/cURL export."
version: 1.0.0
homepage: https://github.com/Tuanpluss02/interceptly
repository: https://github.com/Tuanpluss02/interceptly
issue_tracker: https://github.com/Tuanpluss02/interceptly/issues
documentation: https://pub.dev/documentation/interceptly/latest/

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  dio: ^5.4.0
  http: ^1.0.0
  sensors_plus: ^7.0.0
  flutter:
    sdk: flutter
  path_provider: ^2.1.5
  chopper: ^8.0.0
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # Font assets must be declared so consuming apps can bundle them (e.g. iOS).
  assets:
    - assets/fonts/

  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Italic.ttf
          style: italic
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/JetBrainsMono-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
        - asset: assets/fonts/JetBrainsMono-BoldItalic.ttf
          weight: 700
          style: italic

  # To add custom fonts to your package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts in packages, see
  # https://flutter.dev/to/font-from-package
